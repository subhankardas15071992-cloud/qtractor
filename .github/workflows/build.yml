name: Build qtractor

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-macos-arm64:
    runs-on: macos-latest
    name: macOS ARM64 Build
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install Dependencies
      run: |
        brew install qt@6 cmake pkg-config libsamplerate libsndfile rubberband liblo zlib lv2 lilv suil
        # Set paths for keg-only zlib
        export LDFLAGS="-L/opt/homebrew/opt/zlib/lib"
        export CPPFLAGS="-I/opt/homebrew/opt/zlib/include"
        export PKG_CONFIG_PATH="/opt/homebrew/opt/zlib/lib/pkgconfig:$PKG_CONFIG_PATH"
        # CLAP SDK
        git clone --depth 1 https://github.com/free-audio/clap.git ~/clap
        echo "CLAP_INCLUDE_DIR=$HOME/clap/include" >> $GITHUB_ENV
        echo "CMAKE_PREFIX_PATH=/opt/homebrew/opt/qt@6;$HOME/clap" >> $GITHUB_ENV
    
    - name: Fix Missing Icon & Patch CMake for CoreFoundation
      run: |
        # Create dummy icns if missing to prevent CMake error
        if [ ! -f "src/images/nebulaquasar.icns" ]; then
          mkdir -p src/images
          # Create a minimal valid ICNS file (blank 16x16 icon) to satisfy CMake source list
          # Or simply touch it if the build system handles missing resources gracefully later
          # Here we create a dummy file to pass the existence check
          echo "Creating dummy icon file..."
          touch src/images/nebulaquasar.icns
        fi

        # PATCH: Inject CoreFoundation framework for VST3 SDK on macOS
        # This fixes "_CFRelease", "_CFUUIDCreate" undefined symbols
        sed -i '' 's/target_link_libraries(nebulaquasar_plugin_scan PRIVATE /target_link_libraries(nebulaquasar_plugin_scan PRIVATE "-framework CoreFoundation" /' src/CMakeLists.txt
        # Verify patch applied
        grep "CoreFoundation" src/CMakeLists.txt || echo "Warning: Patch might not have applied if target name differs"

    - name: Configure CMake
      run: |
        mkdir -p build
        cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=Release \
          -DCONFIG_QT6=ON \
          -DCONFIG_LADSPA=OFF \
          -DCONFIG_DSSI=OFF \
          -DCONFIG_AU=ON \
          -DCONFIG_VST2=ON \
          -DCONFIG_VST3=ON \
          -DCONFIG_LV2=ON \
          -DCONFIG_CLAP=ON \
          -DCLAP_INCLUDE_DIR="${{ env.CLAP_INCLUDE_DIR }}" \
          -DCMAKE_OSX_ARCHITECTURES=arm64
    
    - name: Build
      run: |
        cd build
        make -j$(sysctl -n hw.ncpu)
    
    - name: Create DMG
      run: |
        cd build
        hdiutil create -volname "qtractor" -srcfolder "src/qtractor.app" -ov -format UDZO ../qtractor-macOS-arm64.dmg
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: qtractor-macOS-arm64
        path: qtractor-macOS-arm64.dmg

  build-macos-x86_64:
    runs-on: macos-13
    name: macOS x86_64 Build
    # No 'needs' dependency here ensures this runs in parallel with arm64
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install Dependencies
      run: |
        brew install qt@6 cmake pkg-config libsamplerate libsndfile rubberband liblo zlib lv2 lilv suil
        # Set paths for keg-only zlib (Intel Mac path)
        export LDFLAGS="-L/usr/local/opt/zlib/lib"
        export CPPFLAGS="-I/usr/local/opt/zlib/include"
        export PKG_CONFIG_PATH="/usr/local/opt/zlib/lib/pkgconfig:$PKG_CONFIG_PATH"
        # CLAP SDK
        git clone --depth 1 https://github.com/free-audio/clap.git ~/clap
        echo "CLAP_INCLUDE_DIR=$HOME/clap/include" >> $GITHUB_ENV
        echo "CMAKE_PREFIX_PATH=/usr/local/opt/qt@6;$HOME/clap" >> $GITHUB_ENV
    
    - name: Fix Missing Icon & Patch CMake for CoreFoundation
      run: |
        # Create dummy icns if missing
        if [ ! -f "src/images/nebulaquasar.icns" ]; then
          mkdir -p src/images
          echo "Creating dummy icon file..."
          touch src/images/nebulaquasar.icns
        fi

        # PATCH: Inject CoreFoundation framework for VST3 SDK on macOS
        sed -i '' 's/target_link_libraries(nebulaquasar_plugin_scan PRIVATE /target_link_libraries(nebulaquasar_plugin_scan PRIVATE "-framework CoreFoundation" /' src/CMakeLists.txt
        grep "CoreFoundation" src/CMakeLists.txt || echo "Warning: Patch might not have applied"

    - name: Configure CMake
      run: |
        mkdir -p build
        cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=Release \
          -DCONFIG_QT6=ON \
          -DCONFIG_LADSPA=OFF \
          -DCONFIG_DSSI=OFF \
          -DCONFIG_AU=ON \
          -DCONFIG_VST2=ON \
          -DCONFIG_VST3=ON \
          -DCONFIG_LV2=ON \
          -DCONFIG_CLAP=ON \
          -DCLAP_INCLUDE_DIR="${{ env.CLAP_INCLUDE_DIR }}" \
          -DCMAKE_OSX_ARCHITECTURES=x86_64
    
    - name: Build
      run: |
        cd build
        make -j$(sysctl -n hw.ncpu)
    
    - name: Create DMG
      run: |
        cd build
        hdiutil create -volname "qtractor" -srcfolder "src/qtractor.app" -ov -format UDZO ../qtractor-macOS-x86_64.dmg
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: qtractor-macOS-x86_64
        path: qtractor-macOS-x86_64.dmg
