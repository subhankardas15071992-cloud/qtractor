name: Build qtractor

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-macos-arm64:
    runs-on: macos-15
    name: macOS ARM64 Build
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install Dependencies
      run: |
        brew install qt@6 cmake pkg-config libsamplerate libsndfile rubberband liblo zlib lv2 lilv suil
        # Set paths for keg-only zlib (ARM Mac path)
        export LDFLAGS="-L/opt/homebrew/opt/zlib/lib"
        export CPPFLAGS="-I/opt/homebrew/opt/zlib/include"
        export PKG_CONFIG_PATH="/opt/homebrew/opt/zlib/lib/pkgconfig:$PKG_CONFIG_PATH"
        # CLAP SDK
        git clone --depth 1 https://github.com/free-audio/clap.git ~/clap
        echo "CLAP_INCLUDE_DIR=$HOME/clap/include" >> $GITHUB_ENV
        echo "CMAKE_PREFIX_PATH=/opt/homebrew/opt/qt@6;$HOME/clap" >> $GITHUB_ENV
    
    - name: Patch Missing Icon
      run: |
        if [ ! -f "src/images/qtractor.icns" ]; then
          mkdir -p src/images
          # Create a dummy file to satisfy CMake configuration if the real icon is missing
          # The build might still fail later if the file is truly needed for bundling, 
          # but this gets past the "file not found" configure error.
          touch src/images/qtractor.icns
          echo "Created dummy qtractor.icns"
        fi

    - name: Configure CMake
      run: |
        mkdir -p build
        cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=Release \
          -DCONFIG_QT6=ON \
          -DCONFIG_LADSPA=OFF \
          -DCONFIG_DSSI=OFF \
          -DCONFIG_AU=ON \
          -DCONFIG_VST2=ON \
          -DCONFIG_VST3=ON \
          -DCONFIG_LV2=ON \
          -DCONFIG_CLAP=ON \
          -DCLAP_INCLUDE_DIR="${{ env.CLAP_INCLUDE_DIR }}" \
          -DCMAKE_OSX_ARCHITECTURES=arm64 \
          -DCMAKE_EXE_LINKER_FLAGS="-framework CoreFoundation"
    
    - name: Build
      run: |
        cd build
        make -j$(sysctl -n hw.ncpu)
    
    - name: Create DMG
      run: |
        cd build
        if [ -d "src/qtractor.app" ]; then
          hdiutil create -volname "qtractor" -srcfolder "src/qtractor.app" -ov -format UDZO ../qtractor-macOS-arm64.dmg
        else
          echo "Error: qtractor.app not found"
          exit 1
        fi
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: qtractor-macOS-arm64
        path: qtractor-macOS-arm64.dmg

  build-macos-x86_64:
    runs-on: macos-15-intel
    name: macOS x86_64 Build
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install Dependencies
      run: |
        brew install qt@6 cmake pkg-config libsamplerate libsndfile rubberband liblo zlib lv2 lilv suil
        # Set paths for keg-only zlib (Intel Mac path)
        export LDFLAGS="-L/usr/local/opt/zlib/lib"
        export CPPFLAGS="-I/usr/local/opt/zlib/include"
        export PKG_CONFIG_PATH="/usr/local/opt/zlib/lib/pkgconfig:$PKG_CONFIG_PATH"
        # CLAP SDK
        git clone --depth 1 https://github.com/free-audio/clap.git ~/clap
        echo "CLAP_INCLUDE_DIR=$HOME/clap/include" >> $GITHUB_ENV
        echo "CMAKE_PREFIX_PATH=/usr/local/opt/qt@6;$HOME/clap" >> $GITHUB_ENV
    
    - name: Patch Missing Icon
      run: |
        if [ ! -f "src/images/qtractor.icns" ]; then
          mkdir -p src/images
          touch src/images/qtractor.icns
          echo "Created dummy qtractor.icns"
        fi

    - name: Configure CMake
      run: |
        mkdir -p build
        cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=Release \
          -DCONFIG_QT6=ON \
          -DCONFIG_LADSPA=OFF \
          -DCONFIG_DSSI=OFF \
          -DCONFIG_AU=ON \
          -DCONFIG_VST2=ON \
          -DCONFIG_VST3=ON \
          -DCONFIG_LV2=ON \
          -DCONFIG_CLAP=ON \
          -DCLAP_INCLUDE_DIR="${{ env.CLAP_INCLUDE_DIR }}" \
          -DCMAKE_OSX_ARCHITECTURES=x86_64 \
          -DCMAKE_EXE_LINKER_FLAGS="-framework CoreFoundation"
    
    - name: Build
      run: |
        cd build
        make -j$(sysctl -n hw.ncpu)
    
    - name: Create DMG
      run: |
        cd build
        if [ -d "src/qtractor.app" ]; then
          hdiutil create -volname "qtractor" -srcfolder "src/qtractor.app" -ov -format UDZO ../qtractor-macOS-x86_64.dmg
        else
          echo "Error: qtractor.app not found"
          exit 1
        fi
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: qtractor-macOS-x86_64
        path: qtractor-macOS-x86_64.dmg
