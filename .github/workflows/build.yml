name: Build qtractor

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-macos-arm64:
    runs-on: macos-latest
    name: macOS ARM64 Build
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install Dependencies
      run: |
        brew install qt@6 cmake pkg-config libsamplerate libsndfile rubberband liblo zlib lv2 lilv suil
        # Set paths for keg-only zlib
        export LDFLAGS="-L/opt/homebrew/opt/zlib/lib"
        export CPPFLAGS="-I/opt/homebrew/opt/zlib/include"
        export PKG_CONFIG_PATH="/opt/homebrew/opt/zlib/lib/pkgconfig:$PKG_CONFIG_PATH"
        # CLAP SDK
        git clone --depth 1 https://github.com/free-audio/clap.git ~/clap
        echo "CLAP_INCLUDE_DIR=$HOME/clap/include" >> $GITHUB_ENV
        echo "CMAKE_PREFIX_PATH=/opt/homebrew/opt/qt@6;$HOME/clap" >> $GITHUB_ENV
    
    - name: Fix Missing ICNS File
      run: |
        # Create a dummy icns file if it doesn't exist to prevent CMake errors
        if [ ! -f "src/images/nebulaquasar.icns" ]; then
          mkdir -p src/images
          # Create a minimal valid ICNS header (empty but valid structure)
          # or just touch it if the build system only checks existence
          touch src/images/nebulaquasar.icns
          echo "Created dummy nebulaquasar.icns"
        fi

    - name: Configure CMake
      run: |
        mkdir -p build
        cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=Release \
          -DCONFIG_QT6=ON \
          -DCONFIG_LADSPA=OFF \
          -DCONFIG_DSSI=OFF \
          -DCONFIG_AU=ON \
          -DCONFIG_VST2=ON \
          -DCONFIG_VST3=ON \
          -DCONFIG_LV2=ON \
          -DCONFIG_CLAP=ON \
          -DCLAP_INCLUDE_DIR="${{ env.CLAP_INCLUDE_DIR }}" \
          -DCMAKE_PREFIX_PATH="${{ env.CMAKE_PREFIX_PATH }}" \
          -DCMAKE_OSX_ARCHITECTURES=arm64
    
    - name: Build
      run: |
        cd build
        make -j$(sysctl -n hw.ncpu)
    
    - name: Create DMG
      run: |
        cd build
        hdiutil create -volname "qtractor" -srcfolder "src/qtractor.app" -ov -format UDZO ../qtractor-macOS-arm64.dmg
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: qtractor-macOS-arm64
        path: qtractor-macOS-arm64.dmg

  build-macos-x86_64:
    runs-on: macos-13
    name: macOS x86_64 Build
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install Dependencies
      run: |
        brew install qt@6 cmake pkg-config libsamplerate libsndfile rubberband liblo zlib lv2 lilv suil
        # Set paths for keg-only zlib (Intel Mac path)
        export LDFLAGS="-L/usr/local/opt/zlib/lib"
        export CPPFLAGS="-I/usr/local/opt/zlib/include"
        export PKG_CONFIG_PATH="/usr/local/opt/zlib/lib/pkgconfig:$PKG_CONFIG_PATH"
        # CLAP SDK
        git clone --depth 1 https://github.com/free-audio/clap.git ~/clap
        echo "CLAP_INCLUDE_DIR=$HOME/clap/include" >> $GITHUB_ENV
        echo "CMAKE_PREFIX_PATH=/usr/local/opt/qt@6;$HOME/clap" >> $GITHUB_ENV

    - name: Fix Missing ICNS File
      run: |
        if [ ! -f "src/images/nebulaquasar.icns" ]; then
          mkdir -p src/images
          touch src/images/nebulaquasar.icns
          echo "Created dummy nebulaquasar.icns"
        fi
    
    - name: Configure CMake
      run: |
        mkdir -p build
        cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=Release \
          -DCONFIG_QT6=ON \
          -DCONFIG_LADSPA=OFF \
          -DCONFIG_DSSI=OFF \
          -DCONFIG_AU=ON \
          -DCONFIG_VST2=ON \
          -DCONFIG_VST3=ON \
          -DCONFIG_LV2=ON \
          -DCONFIG_CLAP=ON \
          -DCLAP_INCLUDE_DIR="${{ env.CLAP_INCLUDE_DIR }}" \
          -DCMAKE_PREFIX_PATH="${{ env.CMAKE_PREFIX_PATH }}" \
          -DCMAKE_OSX_ARCHITECTURES=x86_64
    
    - name: Build
      run: |
        cd build
        make -j$(sysctl -n hw.ncpu)
    
    - name: Create DMG
      run: |
        cd build
        hdiutil create -volname "qtractor" -srcfolder "src/qtractor.app" -ov -format UDZO ../qtractor-macOS-x86_64.dmg
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: qtractor-macOS-x86_64
        path: qtractor-macOS-x86_64.dmg

  build-windows-x86_64:
    runs-on: windows-latest
    name: Windows x86_64 Build
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install Dependencies via vcpkg
      run: |
        git clone https://github.com/microsoft/vcpkg.git --depth 1
        cd vcpkg
        .\bootstrap-vcpkg.bat
        # Use 'qt6' instead of 'qtbase' to ensure CMake configs are found
        # lv2, lilv, suil, clap are NOT available in vcpkg - disabled
        .\vcpkg install qt6:x64-windows libsndfile:x64-windows rubberband:x64-windows zlib:x64-windows samplerate:x64-windows liblo:x64-windows steinberg-vst3-sdk:x64-windows
        echo "VCPKG_ROOT=${{ github.workspace }}\vcpkg" >> $env:GITHUB_ENV
        # Download CLAP headers manually (optional since CONFIG_CLAP=OFF)
        git clone --depth 1 https://github.com/free-audio/clap.git $env:USERPROFILE\clap
        
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
    
    - name: Configure CMake
      run: |
        mkdir -p build
        cd build
        cmake .. `
          -DCMAKE_BUILD_TYPE=Release `
          -DCONFIG_QT6=ON `
          -DCONFIG_LADSPA=OFF `
          -DCONFIG_DSSI=OFF `
          -DCONFIG_WASAPI=ON `
          -DCONFIG_WAVERT=ON `
          -DCONFIG_ASIO=OFF `
          -DCONFIG_VST2=ON `
          -DCONFIG_VST3=ON `
          -DCONFIG_LV2=OFF `
          -DCONFIG_CLAP=OFF `
          -G "Visual Studio 17 2022" `
          -A x64 `
          -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}\vcpkg\scripts\buildsystems\vcpkg.cmake"
    
    - name: Build
      run: |
        cd build
        cmake --build . --config Release -j $env:NUMBER_OF_PROCESSORS
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: qtractor-Windows-x86_64
        path: build/src/Release/*.exe
