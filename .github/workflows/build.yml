name: Build qtractor

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-macos-arm64:
    runs-on: macos-latest
    name: macOS ARM64 Build
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Dependencies
      run: |
        brew install qt@6 cmake pkg-config libsamplerate libsndfile rubberband liblo zlib lv2 lilv suil
        # Set paths for keg-only zlib
        export LDFLAGS="-L/opt/homebrew/opt/zlib/lib"
        export CPPFLAGS="-I/opt/homebrew/opt/zlib/include"
        export PKG_CONFIG_PATH="/opt/homebrew/opt/zlib/lib/pkgconfig:$PKG_CONFIG_PATH"
        # CLAP SDK
        git clone --depth 1 https://github.com/free-audio/clap.git ~/clap
        echo "CLAP_INCLUDE_DIR=$HOME/clap/include" >> $GITHUB_ENV
        echo "CMAKE_PREFIX_PATH=/opt/homebrew/opt/qt@6;$HOME/clap" >> $GITHUB_ENV

    - name: Patch CMakeLists for Missing Icon and CoreFoundation
      run: |
        # Fix 1: Create a dummy icns file if missing to prevent CMake configure error
        if [ ! -f "src/images/nebulaquasar.icns" ]; then
          mkdir -p src/images
          touch src/images/nebulaquasar.icns
          echo "Created dummy nebulaquasar.icns"
        fi
        
        # Fix 2: Inject CoreFoundation framework for VST3 FUID generation (fixes _CFRelease errors)
        # We look for the target_link_libraries for nebulaquasar_plugin_scan and append CoreFoundation
        if grep -q "nebulaquasar_plugin_scan" src/CMakeLists.txt; then
          sed -i '' 's/\(target_link_libraries.*nebulaquasar_plugin_scan.*\)/\1 "-framework CoreFoundation"/g' src/CMakeLists.txt
          echo "Patched src/CMakeLists.txt for CoreFoundation"
        else
          echo "Could not find nebulaquasar_plugin_scan target to patch, hoping defaults work."
        fi

    - name: Configure CMake
      run: |
        mkdir -p build
        cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=Release \
          -DCONFIG_QT6=ON \
          -DCONFIG_LADSPA=OFF \
          -DCONFIG_DSSI=OFF \
          -DCONFIG_AU=ON \
          -DCONFIG_VST2=ON \
          -DCONFIG_VST3=ON \
          -DCONFIG_LV2=ON \
          -DCONFIG_CLAP=ON \
          -DCLAP_INCLUDE_DIR="${{ env.CLAP_INCLUDE_DIR }}" \
          -DCMAKE_OSX_ARCHITECTURES=arm64

    - name: Build
      run: |
        cd build
        make -j$(sysctl -n hw.ncpu)

    - name: Create DMG
      run: |
        cd build
        hdiutil create -volname "qtractor" -srcfolder "src/qtractor.app" -ov -format UDZO ../qtractor-macOS-arm64.dmg

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: qtractor-macOS-arm64
        path: qtractor-macOS-arm64.dmg

  build-macos-x86_64:
    runs-on: macos-13
    name: macOS x86_64 Build
    # NOTE: Removed 'needs' dependency. This job now runs in parallel with arm64.
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Dependencies
      run: |
        brew install qt@6 cmake pkg-config libsamplerate libsndfile rubberband liblo zlib lv2 lilv suil
        # Set paths for keg-only zlib (Intel Mac path)
        export LDFLAGS="-L/usr/local/opt/zlib/lib"
        export CPPFLAGS="-I/usr/local/opt/zlib/include"
        export PKG_CONFIG_PATH="/usr/local/opt/zlib/lib/pkgconfig:$PKG_CONFIG_PATH"
        # CLAP SDK
        git clone --depth 1 https://github.com/free-audio/clap.git ~/clap
        echo "CLAP_INCLUDE_DIR=$HOME/clap/include" >> $GITHUB_ENV
        echo "CMAKE_PREFIX_PATH=/usr/local/opt/qt@6;$HOME/clap" >> $GITHUB_ENV

    - name: Patch CMakeLists for Missing Icon and CoreFoundation
      run: |
        # Fix 1: Create a dummy icns file if missing
        if [ ! -f "src/images/nebulaquasar.icns" ]; then
          mkdir -p src/images
          touch src/images/nebulaquasar.icns
          echo "Created dummy nebulaquasar.icns"
        fi
        
        # Fix 2: Inject CoreFoundation framework
        if grep -q "nebulaquasar_plugin_scan" src/CMakeLists.txt; then
          sed -i '' 's/\(target_link_libraries.*nebulaquasar_plugin_scan.*\)/\1 "-framework CoreFoundation"/g' src/CMakeLists.txt
          echo "Patched src/CMakeLists.txt for CoreFoundation"
        fi

    - name: Configure CMake
      run: |
        mkdir -p build
        cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=Release \
          -DCONFIG_QT6=ON \
          -DCONFIG_LADSPA=OFF \
          -DCONFIG_DSSI=OFF \
          -DCONFIG_AU=ON \
          -DCONFIG_VST2=ON \
          -DCONFIG_VST3=ON \
          -DCONFIG_LV2=ON \
          -DCONFIG_CLAP=ON \
          -DCLAP_INCLUDE_DIR="${{ env.CLAP_INCLUDE_DIR }}" \
          -DCMAKE_OSX_ARCHITECTURES=x86_64

    - name: Build
      run: |
        cd build
        make -j$(sysctl -n hw.ncpu)

    - name: Create DMG
      run: |
        cd build
        hdiutil create -volname "qtractor" -srcfolder "src/qtractor.app" -ov -format UDZO ../qtractor-macOS-x86_64.dmg

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: qtractor-macOS-x86_64
        path: qtractor-macOS-x86_64.dmg
