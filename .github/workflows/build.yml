name: Build qtractor

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-macos-x86_64:
    runs-on: macos-13
    name: macOS x86_64 Build
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install Dependencies
      run: |
        brew install qt@6 cmake pkg-config libsamplerate libsndfile rubberband liblo zlib lv2 lilv suil
        # Set paths for keg-only zlib (Intel Mac path)
        export LDFLAGS="-L/usr/local/opt/zlib/lib"
        export CPPFLAGS="-I/usr/local/opt/zlib/include"
        export PKG_CONFIG_PATH="/usr/local/opt/zlib/lib/pkgconfig:$PKG_CONFIG_PATH"
        # CLAP SDK - clone to home directory
        git clone --depth 1 https://github.com/free-audio/clap.git ~/clap
        echo "CLAP_INCLUDE_DIR=$HOME/clap/include" >> $GITHUB_ENV
        echo "CMAKE_PREFIX_PATH=/usr/local/opt/qt@6;$HOME/clap" >> $GITHUB_ENV
    
    - name: Patch CMakeLists for CoreFoundation and Missing Icon
      run: |
        # Fix 1: Add CoreFoundation framework for VST3 linker errors on macOS
        if grep -q "target_link_libraries(nebulaquasar_plugin_scan" src/CMakeLists.txt; then
          sed -i '' 's/target_link_libraries(nebulaquasar_plugin_scan /target_link_libraries(nebulaquasar_plugin_scan "-framework CoreFoundation" /' src/CMakeLists.txt
        fi
        
        # Fix 2: Create dummy .icns if missing to prevent CMake configuration failure
        if [ ! -f "src/images/nebulaquasar.icns" ]; then
          mkdir -p src/images
          # Create a minimal valid ICNS file (empty placeholder) or touch it if CMake only checks existence
          # Note: A real icon is better, but this prevents the "file not found" error
          echo "Placeholder" > src/images/nebulaquasar.icns
        fi

    - name: Configure CMake
      run: |
        mkdir -p build
        cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=Release \
          -DCONFIG_QT6=ON \
          -DCONFIG_LADSPA=OFF \
          -DCONFIG_DSSI=OFF \
          -DCONFIG_AU=ON \
          -DCONFIG_VST2=ON \
          -DCONFIG_VST3=ON \
          -DCONFIG_LV2=ON \
          -DCONFIG_CLAP=ON \
          -DCLAP_INCLUDE_DIR="${{ env.CLAP_INCLUDE_DIR }}" \
          -DCMAKE_OSX_ARCHITECTURES=x86_64
    
    - name: Build
      run: |
        cd build
        make -j$(sysctl -n hw.ncpu)
    
    - name: Create DMG
      run: |
        cd build
        # Ensure the app bundle exists before creating DMG
        if [ -d "src/qtractor.app" ]; then
          hdiutil create -volname "qtractor" -srcfolder "src/qtractor.app" -ov -format UDZO ../qtractor-macOS-x86_64.dmg
        else
          echo "Error: qtractor.app not found in build/src"
          exit 1
        fi
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: qtractor-macOS-x86_64
        path: qtractor-macOS-x86_64.dmg
